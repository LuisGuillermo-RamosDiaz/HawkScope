spring.application.name=HawkScope Backend
spring.datasource.url=${DB_URL:jdbc:h2:mem:hawkscopedb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE}
spring.datasource.username=${DB_USERNAME:sa}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driverClassName=${DB_DRIVER:org.h2.Driver}
spring.jpa.database-platform=${DB_DIALECT:org.hibernate.dialect.H2Dialect}
spring.jpa.hibernate.ddl-auto=update
server.port=${PORT:8080}
api.key=${API_KEY:default-dev-key}

jwt.secret=${JWT_SECRET:hawkscope-secret-key-at-least-32-characters-long}
# spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

# Error Handling Configuration
server.error.whitelabel.enabled=false
spring.mvc.throw-exception-if-no-handler-found=true
spring.web.resources.add-mappings=false

# AWS S3 Configuration
aws.s3.bucket=${AWS_S3_BUCKET:hawkscope-bucket}
aws.region=${AWS_REGION:us-east-1}
aws.accessKeyId=${AWS_ACCESS_KEY_ID:}
aws.secretAccessKey=${AWS_SECRET_ACCESS_KEY:}