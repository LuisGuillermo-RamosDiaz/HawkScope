name: Frontend CI (React/Vite)

on:
  push:
    branches: [ "main" ]
    paths:
      - 'frontend/**'
  pull_request:
    branches: [ "main" ]
    paths:
      - 'frontend/**'

jobs:
  build-and-lint:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend

    steps:
    - name: Checkout del código
      uses: actions/checkout@v4

    - name: Configurar Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm' # Nivel producción: Cache de node_modules
        cache-dependency-path: './frontend/package-lock.json'

    - name: Instalar dependencias limpias (Producción)
      run: npm ci

    - name: Generar Build de Producción (Vite)
      run: npm run build

    - name: Analizar código (Linting de React)
      run: npm run lint --if-present

    - name: Subir artefacto de Build
      uses: actions/upload-artifact@v4
      with:
        name: frontend-dist
        path: frontend/dist/
        retention-days: 1

  deploy-to-s3:
    needs: build-and-lint
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
    - name: Descargar artefacto de Build
      uses: actions/download-artifact@v4
      with:
        name: frontend-dist
        path: ./dist

    - name: Configurar Credenciales de AWS
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: us-east-1

    - name: Sincronizar (Upload) a S3
      run: aws s3 sync ./dist s3://${{ secrets.AWS_S3_BUCKET_NAME }} --delete
