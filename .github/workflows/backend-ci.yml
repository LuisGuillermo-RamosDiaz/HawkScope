name: Backend CI (Spring Boot)
on:
  push:
    branches: [ "main" ]
    paths:
      - 'backend/**'
  pull_request:
    branches: [ "main" ]
    paths:
      - 'backend/**'
jobs:
  build-and-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend
    steps:
    - name: Checkout del código
      uses: actions/checkout@v4
    - name: Configurar Java 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: 'maven'
    - name: Compilar y Ejecutar Pruebas Unitarias
      run: >
        mvn clean test 
        -Dspring.datasource.url=jdbc:h2:mem:testdb 
        -Dspring.datasource.driverClassName=org.h2.Driver 
        -Dspring.jpa.database-platform=org.hibernate.dialect.H2Dialect
    - name: Empaquetar JAR (Verificar Build)
      run: mvn clean package -DskipTests
    - name: Subir artefacto JAR temporal (Opcional para revisión)
      uses: actions/upload-artifact@v4
      with:
        name: backend-jar
        path: backend/target/*.jar
        retention-days: 1

  deploy-to-ec2:
    needs: build-and-test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    
    steps:
    - name: Checkout del código
      uses: actions/checkout@v4

    - name: Descargar artefacto JAR
      uses: actions/download-artifact@v4
      with:
        name: backend-jar
        path: ./target

    - name: Transferir JAR y Config a EC2 vía SCP
      uses: appleboy/scp-action@v0.1.7
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ubuntu
        key: ${{ secrets.EC2_SSH_KEY }}
        source: "target/*.jar,backend/ecosystem.config.js"
        target: "~/hawkscope-api/"
        strip_components: 1

    - name: Reiniciar PM2 en EC2 vía SSH
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ubuntu
        key: ${{ secrets.EC2_SSH_KEY }}
        script: |
          cd ~/hawkscope-api
          pm2 restart ecosystem.config.js || pm2 start ecosystem.config.js
          pm2 save
