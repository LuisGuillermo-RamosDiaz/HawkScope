name: Backend CI (Spring Boot)

on:
  push:
    branches: [ "main" ]
    paths:
      - 'backend/**'
  pull_request:
    branches: [ "main" ]
    paths:
      - 'backend/**'

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend

    steps:
    - name: Checkout del código
      uses: actions/checkout@v4

    - name: Configurar Java 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: 'maven' # Nivel producción: Cachea dependencias de Maven

    - name: Compilar y Ejecutar Pruebas (Unit & Integration)
      run: mvn clean verify

    - name: Empaquetar JAR (Verificar Build)
      run: mvn clean package -DskipTests

    - name: Subir artefacto JAR temporal (Opcional para revisión)
      uses: actions/upload-artifact@v4
      with:
        name: backend-jar
        path: backend/target/*.jar
        retention-days: 1
